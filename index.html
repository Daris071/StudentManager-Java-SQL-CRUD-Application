<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudentManager — Java + SQL Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #2a2a3e;
      --surface2: #313145;
      --border: #44445a;
      --text: #cdd6f4;
      --muted: #7f849c;
      --red: #f38ba8;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --blue: #89b4fa;
      --purple: #cba6f7;
      --teal: #94e2d5;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

    .app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 48px 1fr; height: 100vh; }

    /* TOP BAR */
    .topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px;
    }
    .topbar-title { font-size: 14px; font-weight: 700; color: var(--purple); }
    .topbar-sub { color: var(--muted); font-size: 11px; }
    .topbar-badge {
      margin-left: auto;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 3px; font-size: 11px; color: var(--green);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-section {
      padding: 12px 16px 8px;
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; border-bottom: 1px solid var(--border);
    }
    .sidebar-item {
      padding: 10px 16px;
      cursor: pointer; border-bottom: 1px solid rgba(68,68,90,0.4);
      transition: background 0.15s; display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-item:hover { background: var(--surface2); }
    .sidebar-item.active { background: var(--surface2); border-left: 2px solid var(--purple); }
    .sidebar-item .label { color: var(--blue); }
    .sidebar-item .count {
      font-size: 10px; background: var(--surface2);
      border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px; color: var(--muted);
    }
    .sidebar-sql { padding: 12px; flex: 1; overflow: hidden; }
    .sql-title { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
    .sql-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 10px; font-size: 11px; line-height: 1.8;
      color: var(--text); white-space: pre; overflow: auto; height: 160px;
    }

    /* MAIN */
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .toolbar {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: var(--surface);
    }
    .toolbar input, .toolbar select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 7px 12px; border-radius: 4px; font-family: var(--mono); font-size: 12px;
      outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--purple); }
    .toolbar input { width: 220px; }
    .btn {
      padding: 7px 16px; border-radius: 4px; border: none; cursor: pointer;
      font-family: var(--mono); font-size: 12px; font-weight: 600; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-add { background: var(--green); color: #1e1e2e; }
    .btn-del { background: var(--red); color: #1e1e2e; }
    .btn-sort { background: var(--surface2); color: var(--blue); border: 1px solid var(--border); }

    /* TABLE */
    .table-wrap { flex: 1; overflow: auto; padding: 0; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface); border-bottom: 2px solid var(--border);
      padding: 10px 16px; text-align: left; font-size: 11px;
      letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
      position: sticky; top: 0;
    }
    tbody tr { border-bottom: 1px solid rgba(68,68,90,0.5); transition: background 0.12s; cursor: pointer; }
    tbody tr:hover { background: var(--surface); }
    tbody tr.selected { background: rgba(203,166,247,0.08); border-left: 2px solid var(--purple); }
    tbody td { padding: 10px 16px; }
    .grade-badge {
      display: inline-block; padding: 2px 9px; border-radius: 3px; font-size: 11px; font-weight: 700;
    }
    .grade-1 { background: rgba(166,227,161,0.15); color: var(--green); }
    .grade-2 { background: rgba(137,180,250,0.15); color: var(--blue); }
    .grade-3 { background: rgba(249,226,175,0.15); color: var(--yellow); }
    .grade-4 { background: rgba(243,139,168,0.15); color: var(--red); }

    /* MODAL */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 200;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 28px; width: 400px; max-width: 90vw;
    }
    .modal h3 { font-size: 16px; color: var(--purple); margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 1px; }
    .form-row input, .form-row select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 4px;
      font-family: var(--mono); font-size: 13px; outline: none;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--purple); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* STATUS BAR */
    .statusbar {
      background: var(--purple); color: #1e1e2e;
      padding: 4px 20px; font-size: 11px;
      display: flex; gap: 20px; grid-column: 1/-1;
    }

    /* SQL COLOR */
    .kw { color: var(--purple); }
    .str { color: var(--green); }
    .num { color: var(--yellow); }
    .cmt { color: var(--muted); }
  </style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">StudentManager</div>
    <div class="topbar-sub">Java + JDBC + MariaDB Demo</div>
    <div class="topbar-badge" id="db-status">● Connected to: students.db</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">Tables</div>
    <div class="sidebar-item active">
      <span class="label">students</span>
      <span class="count" id="count-badge">0</span>
    </div>
    <div class="sidebar-item">
      <span class="label">courses</span>
      <span class="count">4</span>
    </div>
    <div class="sidebar-item">
      <span class="label">enrollments</span>
      <span class="count">12</span>
    </div>
    <div class="sidebar-section" style="margin-top:auto">SQL Preview</div>
    <div class="sidebar-sql">
      <div class="sql-title">Last Query</div>
      <div class="sql-box" id="sql-preview"><span class="cmt">-- waiting for action...</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by name or ID..." oninput="renderTable()"/>
      <select id="sort-col" onchange="renderTable()">
        <option value="id">Sort: ID</option>
        <option value="name">Sort: Name</option>
        <option value="grade">Sort: Grade</option>
        <option value="semester">Sort: Semester</option>
      </select>
      <button class="btn btn-add" onclick="openModal()">+ Add Student</button>
      <button class="btn btn-del" onclick="deleteSelected()">✕ Delete</button>
      <button class="btn btn-sort" onclick="exportCSV()">↓ Export CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Program</th>
            <th>Semester</th>
            <th>GPA</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="statusbar">
      <span id="status-msg">Ready — 0 students loaded</span>
      <span style="margin-left:auto" id="sel-msg"></span>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Add New Student</h3>
    <div class="form-row">
      <label>FULL NAME</label>
      <input type="text" id="f-name" placeholder="e.g. Max Mustermann"/>
    </div>
    <div class="form-row">
      <label>PROGRAM</label>
      <select id="f-prog">
        <option>Computer Science (B.Sc.)</option>
        <option>Business Informatics</option>
        <option>Electrical Engineering</option>
        <option>Mathematics</option>
      </select>
    </div>
    <div class="form-row">
      <label>SEMESTER</label>
      <select id="f-sem">
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
      </select>
    </div>
    <div class="form-row">
      <label>GPA (1.0 – 5.0)</label>
      <input type="number" id="f-grade" min="1.0" max="5.0" step="0.1" value="2.0"/>
    </div>
    <div class="modal-btns">
      <button class="btn btn-sort" onclick="closeModal()">Cancel</button>
      <button class="btn btn-add" onclick="addStudent()">INSERT INTO students</button>
    </div>
  </div>
</div>

<script>
let students = [
  { id: 1001, name: 'Daris Vatic', program: 'Computer Science (B.Sc.)', semester: 2, grade: 1.7, email: 'darisvatic01@gmail.com', status: 'Active' },
  { id: 1002, name: 'Anna Schmidt', program: 'Business Informatics', semester: 4, grade: 2.3, email: 'a.schmidt@stud.fra-uas.de', status: 'Active' },
  { id: 1003, name: 'Luca Bauer', program: 'Computer Science (B.Sc.)', semester: 1, grade: 3.0, email: 'l.bauer@stud.fra-uas.de', status: 'Active' },
  { id: 1004, name: 'Mia Wagner', program: 'Mathematics', semester: 6, grade: 1.3, email: 'm.wagner@stud.fra-uas.de', status: 'Graduated' },
  { id: 1005, name: 'Felix Müller', program: 'Electrical Engineering', semester: 3, grade: 2.7, email: 'f.mueller@stud.fra-uas.de', status: 'Active' },
  { id: 1006, name: 'Sara Kovač', program: 'Computer Science (B.Sc.)', semester: 2, grade: 1.0, email: 's.kovac@stud.fra-uas.de', status: 'Active' },
  { id: 1007, name: 'Tom Klein', program: 'Business Informatics', semester: 5, grade: 4.0, email: 't.klein@stud.fra-uas.de', status: 'At Risk' },
];
let nextId = 1008;
let selectedId = null;

function gradeClass(g) {
  if (g <= 1.5) return 'grade-1';
  if (g <= 2.5) return 'grade-2';
  if (g <= 3.5) return 'grade-3';
  return 'grade-4';
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-col').value;
  let data = students.filter(s => s.name.toLowerCase().includes(q) || String(s.id).includes(q));
  data.sort((a, b) => typeof a[sort] === 'string' ? a[sort].localeCompare(b[sort]) : a[sort] - b[sort]);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.map(s => `
    <tr class="${s.id === selectedId ? 'selected' : ''}" onclick="selectRow(${s.id})">
      <td style="color:var(--muted)">${s.id}</td>
      <td style="font-weight:600">${s.name}</td>
      <td style="color:var(--blue)">${s.program}</td>
      <td style="text-align:center">${s.semester}</td>
      <td><span class="grade-badge ${gradeClass(s.grade)}">${s.grade.toFixed(1)}</span></td>
      <td style="color:var(--muted)">${s.email}</td>
      <td style="color:${s.status==='Active'?'var(--green)':s.status==='Graduated'?'var(--purple)':'var(--red)'}">${s.status}</td>
    </tr>
  `).join('');

  document.getElementById('count-badge').textContent = students.length;
  document.getElementById('status-msg').textContent = `${data.length} of ${students.length} students shown`;
  setSql(`SELECT * FROM students\nWHERE name LIKE '%${q||''}%'\nORDER BY ${sort} ASC;`);
}

function selectRow(id) {
  selectedId = selectedId === id ? null : id;
  const s = students.find(s => s.id === id);
  if (s) {
    setSql(`SELECT * FROM students\nWHERE id = ${id};\n\n-- Result: ${s.name}`);
    document.getElementById('sel-msg').textContent = `Selected: ${s.name}`;
  } else {
    document.getElementById('sel-msg').textContent = '';
  }
  renderTable();
}

function setSql(sql) {
  const el = document.getElementById('sql-preview');
  el.innerHTML = sql
    .replace(/(SELECT|FROM|WHERE|ORDER BY|INSERT INTO|VALUES|DELETE|UPDATE|SET|LIKE|ASC|DESC)/g, '<span class="kw">$1</span>')
    .replace(/('[^']*')/g, '<span class="str">$1</span>')
    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
    .replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>');
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function addStudent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const student = {
    id: nextId++,
    name,
    program: document.getElementById('f-prog').value,
    semester: parseInt(document.getElementById('f-sem').value),
    grade: parseFloat(document.getElementById('f-grade').value),
    email: name.split(' ')[0].toLowerCase() + '@stud.fra-uas.de',
    status: 'Active',
  };
  students.push(student);
  setSql(`INSERT INTO students\n  (id, name, program, semester, grade)\nVALUES\n  (${student.id}, '${student.name}',\n   '${student.program}',\n   ${student.semester}, ${student.grade});`);
  closeModal();
  renderTable();
  document.getElementById('f-name').value = '';
}

function deleteSelected() {
  if (!selectedId) { alert('Select a student first.'); return; }
  const s = students.find(s => s.id === selectedId);
  if (!confirm(`Delete ${s.name}?`)) return;
  setSql(`DELETE FROM students\nWHERE id = ${selectedId};\n\n-- ${s.name} removed.`);
  students = students.filter(s => s.id !== selectedId);
  selectedId = null;
  document.getElementById('sel-msg').textContent = '';
  renderTable();
}

function exportCSV() {
  const header = 'ID,Name,Program,Semester,GPA,Email,Status';
  const rows = students.map(s => `${s.id},${s.name},${s.program},${s.semester},${s.grade},${s.email},${s.status}`);
  const csv = [header, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'students_export.csv';
  a.click();
  setSql(`SELECT * FROM students\nINTO OUTFILE 'students_export.csv'\nFIELDS TERMINATED BY ',';\n\n-- Exported ${students.length} rows.`);
}

renderTable();
</script>
</body>
</html>
